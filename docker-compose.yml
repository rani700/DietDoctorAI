services:
  diet-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: diet-expert-ai:latest
    container_name: diet-expert-ai
    ports:
      - "8000:8000"
    env_file:
      - diet_agent/.env
    volumes:
      # Persist user data and conversation history across restarts
      - user_data:/app/user_data
      - conversation_data:/app/conversation_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  user_data:
  conversation_data:
