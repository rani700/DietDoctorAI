# ============================================================================
# CI/CD – Build, push to GHCR, auto-version & tag
# ============================================================================
# Triggers:
#   • Every push to `main` → bump patch version, tag, build & push image
#   • Pull requests to `main` → build only (no push, no tag)
#
# Versioning scheme: MAJOR.MINOR.PATCH
#   • MAJOR – changed manually in the VERSION file
#   • MINOR – changed manually in the VERSION file
#   • PATCH – auto-incremented on every push to main
# ============================================================================

name: CI/CD – Build, Version & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME resolves to rani700/DietDoctorAI via github.repository
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write          # needed to push the version bump commit & tag
  packages: write          # needed to push to GHCR
  id-token: write          # optional – for signing

jobs:
  # -------------------------------------------------------------------
  # 1. Bump version (only on push to main, not on PRs)
  # -------------------------------------------------------------------
  version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0              # full history so we can see tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          # Read current version from VERSION file
          CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Current version: $CURRENT_VERSION"

          # Split into parts
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

          # Increment patch
          PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          # Write back
          echo "$NEW_VERSION" > VERSION
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

      - name: Create git tag
        run: |
          TAG="v${{ steps.bump.outputs.new_version }}"
          git tag "$TAG"
          git push origin "$TAG"

  # -------------------------------------------------------------------
  # 2. Build & push Docker image to GHCR
  # -------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: [version]
    if: always() && (needs.version.result == 'success' || github.event_name == 'pull_request')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && 'main' || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # On push to main – use the version we just bumped
            type=raw,value=${{ needs.version.outputs.new_version }},enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            # On PR – tag with the PR number for testing
            type=ref,event=pr

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
